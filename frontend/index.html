<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Market Delta | Dashboard</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    </head>

    <body class="bg-slate-900 text-white font-sans">

        <!-- Navigation -->
         <nav class="border-b border-slate-800 p-4">
            <div class="container mx-auto flex justify-between items-center">
                <h1 class="text-2xl font-bold tracking-tighter text-blue-500">MARKET DELTA</h1>
                <span class="text-xs bg-slate-800 px-3 py-1 rounded-full text-slate-400">v1.0 - Live Data</span>
            </div>
         </nav>

        <!-- Main Content -->
         <main class="container mx-auto p-8">
            <div class="mb-8">
                <h2 class="text-4xl font-extrabold mb-2">Market Intelligence</h2>
                <p class="text-slate-400">Tracking competitor price fluctuations in real-time</p>
            </div>

            <div class="bg-slate-800 border border-slate-700 p-6 rounded-xl mb-12">
                <h3 class="text-lg font-bold mb-4">Track New Product</h3>
                <div class="flex gap-4">
                    <input type="text" id="url-input" placeholder="Paste books.to.scrape.com URL here..."
                    class="bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 w-full focus:outline-none focus:border-blue-500 text-white">
                    <button onclick="addProduct()" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2 rounded-lg font-bold transition-all">
                        Track
                    </button>
                </div>
                <p id="message" class="mt-2 text-sm"></p>
            </div>
            <div class="bg-slate-800 border border-slate-700 p-6 rounded-xl mb-12">
    <h3 class="text-lg font-bold mb-2">Bulk Track Products</h3>
    <p class="text-xs text-slate-400 mb-4">Paste multiple URLs (one per line)</p>
    
        <div class="flex flex-col gap-4">
            <textarea id="bulk-url-input" rows="4" 
                    placeholder="https://site.com/product1&#10;https://site.com/product2"
                    class="bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 w-full focus:outline-none focus:border-blue-500 text-white font-mono text-sm"></textarea>
            
            <button onclick="bulkAdd()" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-3 rounded-lg font-bold transition-all">
                Start Bulk Ingestion
            </button>
        </div>
        <p id="bulk-message" class="mt-2 text-sm"></p>
    </div>

            <!-- Dashboard Grid -->
             <div id="product-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Data will be injected here by JavaScript -->
                 <div class="animate-pulse bg-slate-800 h-64 rounded-xl"></div>
                 <div class="animate-pulse bg-slate-800 h-64 rounded-xl"></div>
            </div>
         </main>

         <script>

            async function addProduct(){
                const urlInput = document.getElementById('url-input')
                const msg = document.getElementById('message');
                const url = urlInput.value;

                if (!url) return;

                msg.innerText = "Processing... please wait.";
                msg.className = "mt-2 text-sm text-blue-400";

                try{
                    const response = await fetch('http://127.0.0.1:8000/add-product',{
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ url: url })
                    });

                    const result = await response.json();

                    if (response.ok) {
                        msg.innerText = "Success! Product added.";
                        msg.className = "mt-2 text-sm text-green-400";
                        urlInput.value = '';
                        loadDashboard();
                    } else {
                        msg.innerText = "Error: " + result.detail;
                        msg.className = "mt-2 text-sm text-red-400";
                    }
                } catch (error) {
                    msg.innerText = "API is offline.";
                }
            }

            async function loadDashboard() {
                try {
                        const response = await fetch('http://127.0.0.1:8000/dashboard-stats');
                        const data = await response.json();

                        const grid = document.getElementById('product-grid');
                        grid.innerHTML = ''; 

                        data.forEach(item => {
                            const card = `
                                <div class="bg-slate-800 border border-slate-700 p-6 rounded-xl hover:border-blue-500 transition-all shadow-xl">
                                    <div class="flex justify-between items-start mb-4">
                                        <h3 class="text-lg font-bold truncate pr-4">${item.title}</h3>
                                        <span class="text-blue-400 text-xs font-bold">ID: ${item.id}</span>
                                    </div>
                                    <div class="flex justify-between items-end mb-6">
                                        <div>
                                            <span class="text-slate-400 text-xs block uppercase tracking-widest">Current Price</span>
                                            <span class="text-3xl font-black text-white">£${item.current_price}</span>
                                        </div>
                                        <div class="text-right">
                                            <span class="text-slate-500 text-[10px] block uppercase">Last Updated</span>
                                            <span class="text-slate-300 text-xs">${new Date(item.last_updated).toLocaleDateString()}</span>
                                        </div>
                                    </div>
                                    <div class="h-32 w-full mb-4">
                                        <canvas id="chart-${item.id}"></canvas>
                                    </div>
                                    <div class="flex justify-between items-center border-t border-slate-700 pt-4">
                                        <a href="${item.url}" target="_blank" class="text-blue-500 hover:text-blue-400 text-xs font-bold uppercase">View Source</a>
                                        <button class="text-slate-400 hover:text-white text-xs uppercase font-bold">Details</button>
                                    </div>
                                </div>
                            `;
                            grid.innerHTML += card;
                        });
                        
                        setTimeout(() => {
                            data.forEach(product => {
                                renderChart(product.id);
                            });
                        }, 200);

                    } catch (error) {
                        console.error('Error loading dashboard:', error);
                    }
                }

            async function bulkAdd(){
                const input = document.getElementById('bulk-url-input');
                const msg = document.getElementById('bulk-message');
                const urls = input.value.split('\n').filter(u => u.trim() !== "");

                if (urls.length === 0) return;

                msg.innerText = `Processing ${urls.length} products... This may take minute.`;
                msg.className = "mt-2 text-sm text-blue-400"

                try{
                    const response = await fetch('http://127.0.0.1:8000/bulk-add-product',{
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json'},
                        body:JSON.stringify({ urls: urls})
                    });

                    const result = await response.json();
                    msg.innerText = result.message;
                    msg.className = "mt-2 text-sm txt-green-400";

                    input.value = '';
                    loadDashboard(); //Refresh UI
                } catch (error) {
                    msg.innerText = "API Error. check console.";
                }
            }

            async function renderChart(productId) {
                try {
                    const response = await fetch(`http://127.0.0.1:8000/product-history/${productId}`);
                    const history = await response.json();

                    const canvas = document.getElementById(`chart-${productId}`);
                    if (!canvas) return;
                    
                    const ctx = canvas.getContext('2d');
                    
                    new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: history.map(h => new Date(h.timestamp).toLocaleDateString()),
                            datasets: [{
                                label: 'Price Evolution',
                                data: history.map(h => h.price),
                                borderColor: '#3b82f6', 
                                backgroundColor: 'rgba(59, 130, 246, 0.1)',
                                fill: true,
                                tension: 0.4,
                                borderWidth: 2,
                                pointRadius: 0
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: { legend: { display: false } },
                            scales: {
                                x: { display: false },
                                y: {
                                    grid: { color: 'rgba(255,255,255,0.05)' },
                                    ticks: { color: '#64748b', font: { size: 10 } }
                                }
                            }
                        }
                    });
                } catch (e) {
                    console.error("Chart Error:", e);
                }
            }

            // Run when page loads
            loadDashboard();
         </script>
    </body>
</html>
