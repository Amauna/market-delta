<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Market Delta | Dashboard</title>
        <script src="https://cdn.tailwindcss.com"></script>
    </head>

    <body class="bg-slate-900 text-white font-sans">

        <!-- Navigation -->
         <nav class="border-b border-slate-800 p-4">
            <div class="container mx-auto flex justify-between items-center">
                <h1 class="text-2xl font-bold tracking-tighter text-blue-500">MARKET DELTA</h1>
                <span class="text-xs bg-slate-800 px-3 py-1 rounded-full text-slate-400">v1.0 - Live Data</span>
            </div>
         </nav>

        <!-- Main Content -->
         <main class="container mx-auto p-8">
            <div class="mb-8">
                <h2 class="text-4xl font-extrabold mb-2">Market Intelligence</h2>
                <p class="text-slate-400">Tracking competitor price fluctuations in real-time</p>
            </div>

            <div class="bg-slate-800 border border-slate-700 p-6 rounded-xl mb-12">
                <h3 class="text-lg font-bold mb-4">Track New Product</h3>
                <div class="flex gap-4">
                    <input type="text" id="url-input" placeholder="Paste books.to.scrape.com URL here..."
                    class="bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 w-full focus:outline-none focus:border-blue-500 text-white">
                    <button onclick="addProduct()" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2 rounded-lg font-bold transition-all">
                        Track
                    </button>
                </div>
                <p id="message" class="mt-2 text-sm"></p>
            </div>

            <!-- Dashboard Grid -->
             <div id="product-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Data will be injected here by JavaScript -->
                 <div class="animate-pulse bg-slate-800 h-64 rounded-xl"></div>
                 <div class="animate-pulse bg-slate-800 h-64 rounded-xl"></div>
            </div>
         </main>

         <script>

            async function addProduct(){
                const urlInput = document.getElementById('url-input')
                const msg = document.getElementById('message');
                const url = urlInput.value;

                if (!url) return;

                msg.innerText = "Processing... please wait.";
                msg.className = "mt-2 text-sm text-blue-400";

                try{
                    const response = await fetch('http://127.0.0.1:8000/add-product',{
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ url: url })
                    });

                    const result = await response.json();

                    if (response.ok) {
                        msg.innerText = "Success! Product added.";
                        msg.className = "mt-2 text-sm text-green-400";
                        urlInput.value = '';
                        loadDashboard();
                    } else {
                        msg.innerText = "Error: " + result.detail;
                        msg.className = "mt-2 text-sm text-red-400";
                    }
                } catch (error) {
                    msg.innerText = "API is offline.";
                }
            }

            async function loadDashboard() {
                try {
                    // Fetch data from FastAPI
                    const response = await fetch('http://127.0.0.1:8000/dashboard-stats');
                    const data = await response.json();

                    const grid = document.getElementById('product-grid');
                    grid.innerHTML = ''; //Clear the loading state

                    // Loop through each product and create a card
                    data.forEach(item => {
                        const card = `
                        <div class="bg-slate-800 border border-slate-700 p-6 rounded-xl hover:border-blue-500 transition-all shadow-xl">
                            <div class="flex justify-between items-start mb-4">
                                <h3 class="text-xl font-bold truncate pr-4">${item.title}</h3>
                                <span class="bg-blue-900/50 text-blue-400 text-xs font-bold px-2 py-1 rounded">ID: ${item.id}</span>
                            </div>
                            
                            <div class="mb-6">
                                <span class="text-slate-400 text-sm block mb-1">Current Price</span>
                                <span class="text-4xl font-black text-white">£${item.current_price}</span>
                            </div>

                            <div class="flex flex-col gap-2">
                                <a href="${item.url}" target="_blank" class="text-blue-400 hover:text-blue-300 text-sm underline truncate">View Source</a>
                                <div class="text-[10px] text-slate-500 uppercase tracking-widest mt-2">
                                    Last Updated: ${new Date(item.last_updated).toLocaleString()}
                                </div>
                            </div>
                        </div>
                    `;
                        grid.innerHTML += card;
                    });
                }catch (error) {
                    console.error('Error loading dashboard:', error);
                    document.getElementById('product-grid').innerHTML = '<p class="text-red-500"> API Offline. Please start the FastAPI server.</p>';
                }
            }

            // Run when page loads
            loadDashboard();
         </script>
    </body>
</html>
