<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Delta | Intelligence Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-[#F8F9FB] text-slate-800 font-sans flex h-screen overflow-hidden text-sm">

    <!-- SIDEBAR -->
    <aside class="w-64 bg-white border-r border-slate-200 flex flex-col shrink-0">
        <div class="p-6 border-b border-slate-100 font-black text-xl tracking-tighter text-blue-600">
            MARKET DELTA
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <a href="#" class="flex items-center gap-3 p-3 bg-blue-50 text-blue-600 rounded-xl font-bold">Dashboard</a>
            <a href="#" class="flex items-center gap-3 p-3 text-slate-400 hover:bg-slate-50 rounded-xl transition-all">Analytics</a>
            <a href="#" class="flex items-center gap-3 p-3 text-slate-400 hover:bg-slate-50 rounded-xl transition-all">Settings</a>
        </nav>
        <div class="p-6 text-[10px] uppercase tracking-widest text-slate-400 border-t border-slate-100">
            v1.1 - Enterprise
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 overflow-y-auto p-8">
        
        <header class="flex justify-between items-center mb-8">
            <div>
                <h2 class="text-2xl font-bold">Market Overview</h2>
                <p class="text-slate-400 text-xs">Real-time competitor price monitoring</p>
            </div>
            <button onclick="document.getElementById('add-modal').classList.remove('hidden')" 
                    class="bg-blue-600 text-white px-5 py-2.5 rounded-xl font-bold text-xs shadow-lg shadow-blue-200 hover:bg-blue-700 transition-all">
                + TRACK NEW PRODUCT
            </button>
        </header>

        <!-- KPI CARDS -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm">
                <span class="text-slate-400 text-[10px] font-bold uppercase tracking-wider">Total Assets</span>
                <div class="text-3xl font-black mt-1" id="kpi-total">0</div>
            </div>
            <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm">
                <span class="text-slate-400 text-[10px] font-bold uppercase tracking-wider">Active Drops</span>
                <div class="text-3xl font-black mt-1 text-green-500" id="kpi-drops">0</div>
            </div>
            <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm">
                <span class="text-slate-400 text-[10px] font-bold uppercase tracking-wider">Last Sync</span>
                <div class="text-xl font-bold mt-2 text-slate-700" id="kpi-sync">--:--</div>
            </div>
        </div>

        <!-- PRODUCT TABLE -->
        <div class="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-50/50 border-b border-slate-100">
                        <th class="p-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest">Product Intelligence</th>
                        <th class="p-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest">Price</th>
                        <th class="p-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest">Trend (7D)</th>
                        <th class="p-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest">Status</th>
                        <th class="p-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest text-right">Action</th>
                    </tr>
                </thead>
                <tbody id="product-table-body">
                    <!-- Data injected here -->
                </tbody>
            </table>
        </div>
    </main>

    <!-- ADD MODAL -->
    <div id="add-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-3xl p-8 max-w-lg w-full shadow-2xl">
            <h3 class="text-xl font-bold mb-2">Add New Monitor</h3>
            <p class="text-slate-400 text-xs mb-6">Paste URLs separated by lines for bulk tracking.</p>
            <textarea id="bulk-url-input" rows="5" class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 text-sm focus:outline-none focus:border-blue-500 font-mono mb-4" placeholder="https://..."></textarea>
            <div class="flex gap-3">
                <button onclick="bulkAdd()" class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700">Start Tracking</button>
                <button onclick="document.getElementById('add-modal').classList.add('hidden')" class="px-6 py-3 text-slate-400 font-bold hover:text-slate-600">Cancel</button>
            </div>
            <p id="bulk-message" class="mt-4 text-center text-xs font-bold"></p>
        </div>
    </div>

    <script>
        async function loadDashboard() {
            try {
                const response = await fetch('http://127.0.0.1:8000/dashboard-stats');
                const data = await response.json();
                
                // Update KPIs
                document.getElementById('kpi-total').innerText = data.length;
                document.getElementById('kpi-sync').innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

                const tableBody = document.getElementById('product-table-body');
                tableBody.innerHTML = '';

                data.forEach(item => {
                    const row = `
                        <tr class="border-b border-slate-50 hover:bg-slate-50/50 transition-all">
                            <td class="p-4">
                                <div class="font-bold text-slate-900">${item.title}</div>
                                <div class="text-[10px] text-slate-400 truncate max-w-[200px]">${item.url}</div>
                            </td>
                            <td class="p-4 font-black text-lg text-slate-700">£${item.current_price}</td>
                            <td class="p-4 w-48">
                                <div class="h-10 w-full"><canvas id="chart-${item.id}"></canvas></div>
                            </td>
                            <td class="p-4">
                                <span class="bg-green-100 text-green-600 text-[10px] font-bold px-2 py-1 rounded-full uppercase">Stable</span>
                            </td>
                            <td class="p-4 text-right">
                                <a href="${item.url}" target="_blank" class="text-blue-600 hover:underline font-bold text-xs uppercase">Source</a>
                            </td>
                        </tr>
                    `;
                    tableBody.innerHTML += row;
                });

                // Render Sparklines
                setTimeout(() => {
                    data.forEach(p => renderSparkline(p.id));
                }, 300);

            } catch (err) { console.error(err); }
        }

        async function renderSparkline(productId) {
            const response = await fetch(`http://127.0.0.1:8000/product-history/${productId}`);
            const history = await response.json();
            const ctx = document.getElementById(`chart-${productId}`).getContext('2d');
            
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: history.map(h => h.timestamp),
                    datasets: [{
                        data: history.map(h => h.price),
                        borderColor: '#3b82f6',
                        borderWidth: 2,
                        pointRadius: 0,
                        tension: 0.4,
                        fill: true,
                        backgroundColor: 'rgba(59, 130, 246, 0.05)'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { x: { display: false }, y: { display: false } }
                }
            });
        }

        async function bulkAdd() {
            const input = document.getElementById('bulk-url-input');
            const msg = document.getElementById('bulk-message');
            const urls = input.value.split('\n').filter(u => u.trim() !== "");
            if (!urls.length) return;

            msg.innerText = "Processing ingestion...";
            msg.className = "mt-4 text-center text-xs font-bold text-blue-500";

            const response = await fetch('http://127.0.0.1:8000/bulk-add-product', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ urls: urls })
            });
            const result = await response.json();
            
            msg.innerText = result.message;
            msg.className = "mt-4 text-center text-xs font-bold text-green-500";
            setTimeout(() => {
                document.getElementById('add-modal').classList.add('hidden');
                loadDashboard();
            }, 1000);
        }

        loadDashboard();
    </script>
</body>
</html>
